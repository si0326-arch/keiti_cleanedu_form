인",duty:"7호: 공사·용역 또는 물품 등의 조달·구매의 계약·검사·검수에 관계되는 직무 (구체: A주식회사가 참여한 ○○용역 발주 계약)",dutyTypeCheck:"[✔] 공직자가 소속된 공공기관과 계약을 체결하거나 체결하려는 것이 명백한 개인이나 법인 또는 단체",evidence:"A주식회사 법인 등기부 등본(공개정보), 본인 가족관계증명서, ○○용역 입찰 참여업체 명단 (입찰 접수 시스템 출력본)"}},keiti:{id:"common-keiti",formId:"conflictKeiti",title:"친분 있는 외부인의 업체가 본인 담당 업무에 입찰 참여 (KEITI제도용)",refSource:"이충법 유권해석 사례집 2025",situation:"본인은 본원의 ○○ 사업 계약관리 담당자이다. 본인의 대학 동기 이OO가 B크리에이티브의 대표이며, 졸업 이후에도 월 1~2회 이상 정기적으로 모임·연락을 이어온 친분관계가 있다는 사실은 이미 알고 있었다. 202○년 ○월 본인이 담당하는 ○○사업 입찰 참여업체 명단을 확인하던 중, B크리에이티브가 동 입찰에 참여한 사실을 확인하였다. 「공직자의 이해충돌 방지법」상 법적 사적이해관계자에는 해당하지 않으나, 공정한 직무수행에 영향을 미칠 수 있다고 판단하여 KEITI 이해관계신고제도에 따라 자율적으로 신고하고자 한다.",examples:{work:"○○ 사업 계약관리",relatedPerson:"이OO / B크리에이티브 대표 (본인의 대학 동기)",personType:"[✔] 법인",relationship:"대학 동기로 졸업 이후 정기적 모임 및 연락 유지 (월 1~2회 이상)",duty:"7호: 공사·용역 또는 물품 등의 조달·구매의 계약·검사·검수에 관계되는 직무",dutyTypeCheck:"[✔] 공직자가 소속된 공공기관과 계약을 체결하거나 체결하려는 것이 명백한 개인이나 법인 또는 단체",evidence:"B크리에이티브 사업자등록증(공개정보), ○○사업 입찰 참여업체 명단, 친분관계 확인 자료(본인이 보관 중인 모임 일정·연락 기록 등)"}}},Bd={audit:[{id:"audit-A",formId:"selfReport",title:"외부 업체 대표의 반복적인 식사 접대 제안",refSource:"청탁금지법 결정례집 2023 / 반복 청탁 신고",situation:'본인은 KEITI 발주 ○○사업 계약 관련 부패행위 의혹과 관련하여 외부 업체 B산업(주)을 조사 대상으로 감사를 진행 중인 감사실 담당자이다. 202○년 ○월부터 ○월까지 약 두 달간, 외부 업체 B산업(주) 대표 김OO이 감사 진행 상황을 확인하며 "감사 잘 마무리되면 식사 한번 하시죠"라며 1인 약 15만원 상당의 고급 식당 식사 자리를 총 3회 제안하였다. 매번 명시적으로 거절하였으나, 반복적이고 지속적인 청탁에 해당하여 청탁금지법 제9조에 따라 신고하고자 한다.',examples:{offender:"김OO / B산업(주) 대표 (감사 대상 외부 업체)",purpose:"감사 진행 중 외부 업체 대표가 반복적으로(총 3회) 고급 식당 식사 자리를 제안하여, 매번 거절하였으나 지속적인 청탁 시도에 해당하여 청탁금지법 제9조에 따라 신고함",date:"1차: 202○년 ○월 ○일 / 2차: 202○년 ○월 ○일 / 3차: 202○년 ○월 ○일 (감사 결과 통보 직전)",place:"본원 감사실 (직접 방문 1회) / 전화 통화 (2회)",content:"고급 식당 식사 접대 제안 3회 (각 1인 약 15만원 상당, 모두 미수령)",return:"수령 거부 - 각 시점마다 명시적으로 거절하여 실제 수령하지 않음",evidence:"감사 진행 일지(식사 제안 일시·장소 기록), 본인 업무수첩 사본, 거절 시 동석한 동료 직원 진술서"}},{id:"audit-B",formId:"selfReport",title:"조사대상 업체 지인을 통한 청탁과 상품권 제공 시도",refSource:"청탁금지법 결정례집 2023",situation:'본인은 외부 업체 B산업(주) 대표 김OO에 대한 부패행위 조사를 진행 중이다. 202○년 ○월 ○일, 조사 대상자의 지인이라며 이OO가 본원 감사실로 찾아와 "잘 봐달라"는 청탁과 함께 백화점 상품권 30만원이 든 봉투를 책상 위에 두고 갔다. 본인은 발견 즉시 동일인에게 직접 반환 조치하였으며, 금품 수수 시도에 해당하여 청탁금지법에 따라 즉시 신고하고자 한다.',examples:{offender:"이OO / 조사 대상자 김OO(B산업(주) 대표)의 지인 (외부인)",purpose:"조사 진행 중 대상자의 지인이 사무실로 찾아와 상품권 봉투를 두고 가, 즉시 반환 조치하였고 금품 수수 시도에 해당하여 청탁금지법에 따라 즉시 신고함",date:"202○년 ○월 ○일 (조사 진행 중)",place:"본원 감사실",content:"백화점 상품권 30만원 (봉투에 담아 책상 위에 두고 감)",return:"반환 완료 - 발견 즉시 동일인에게 직접 반환, 청탁방지담당관에 즉시 신고",evidence:"수령 거부한 상품권 봉투 사진, 반환 시 동행 직원 진술서, 청탁방지담당관 신고 접수 기록, 반환 영수증"}}],planning:[{id:"planning-A",formId:"conflictLegal",title:"배우자가 임원으로 재직 중인 법인이 본인 담당 홍보용역에 입찰 참여 (법적신고용)",refSource:"이충법 유권해석 사례집 2025",situation:"본인은 경영기획처 ○○ 홍보용역 발주 및 계약관리 담당자이다. 본인의 배우자 김OO가 A홍보(주)의 대표이사로 재직 중인 사실은 이미 알고 있었다. 202○년 ○월 본인이 발주한 ○○홍보용역 입찰 접수 마감 후 참여업체 명단을 확인하던 중, A홍보(주)가 동 입찰에 참여한 사실을 확인하였다. 「공직자의 이해충돌 방지법」 제2조제6호 나목에 따른 사적이해관계자(가족이 임원으로 재직하는 법인)에 해당하므로, 법 제5조에 따라 신고 및 회피를 신청하고자 한다.",examples:{work:"○○ 홍보용역 발주 및 계약관리",relatedPerson:"김OO / A홍보(주) 대표이사 (본인의 배우자)",personType:"[✔] 법인",relationship:"나목 - 공직자의 가족(배우자)이 임원·대표자로 재직하고 있는 법인",duty:"7호: 공사·용역 또는 물품 등의 조달·구매의 계약·검사·검수에 관계되는 직무 (구체: A홍보(주)가 참여한 ○○홍보용역 발주 계약)",dutyTypeCheck:"[✔] 공직자가 소속된 공공기관과 계약을 체결하거나 체결하려는 것이 명백한 개인이나 법인 또는 단체",evidence:"A홍보(주) 법인 등기부 등본(공개정보), 본인 가족관계증명서, ○○홍보용역 입찰 참여업체 명단 (입찰 접수 시스템 출력본)"}},{id:"planning-B",formId:"conflictKeiti",title:"대학 동기가 대표인 업체가 본인 담당 기획용역에 입찰 참여 (KEITI제도용)",refSource:"이충법 유권해석 사례집 2025",situation:"본인은 홍보실 ○○ 기획·커뮤니케이션 용역 계약관리 담당자이다. 본인의 대학 동기 이OO가 B크리에이티브의 대표이며 졸업 이후에도 월 1~2회 이상 정기적 모임·연락을 이어온 친분관계가 있다는 사실은 이미 알고 있었다. 202○년 ○월 본인이 담당하는 ○○기획용역 입찰 참여업체 명단을 확인하던 중, B크리에이티브가 동 입찰에 참여한 사실을 확인하였다. 「공직자의 이해충돌 방지법」상 법적 사적이해관계자에는 해당하지 않으나, 공정한 직무수행에 영향을 미칠 수 있다고 판단하여 KEITI 이해관계신고제도에 따라 자율적으로 신고하고자 한다.",examples:{work:"○○ 기획·커뮤니케이션 용역 계약관리",relatedPerson:"이OO / B크리에이티브 대표 (본인의 대학 동기)",personType:"[✔] 법인",relationship:"대학 동기로 졸업 이후 정기적 모임 및 연락 유지 (월 1~2회 이상)",duty:"7호: 공사·용역 또는 물품 등의 조달·구매의 계약·검사·검수에 관계되는 직무",dutyTypeCheck:"[✔] 공직자가 소속된
